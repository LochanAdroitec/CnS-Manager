<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
<!-- Sidebar Fragment -->
<div th:fragment="sidebar" id="sidebar" class="sidebar-container text-white">
    <div class="sidebar-content">

        <!-- License Edition Badge -->
        <div class="mb-3" id="license-edition-badge" style="padding: 10px; border-radius: 8px; text-align: center; background: #667eea; display: none;">
            <span id="edition-text" style="font-weight: 600; font-size: 12px;">Loading...</span>
        </div>

        <!-- Browse Section -->
        <div class="mb-4">
            <h6 class="sidebar-section-title text-uppercase text-white-50 mb-3">Library</h6>
            <hr>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a th:href="@{/documents}" class="nav-link text-white" title="Document Library">
                        <img src="/images/library.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">Document Library</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/my-bookmarks}" class="nav-link text-white" title="My Bookmarks">
                        <img src="/images/bookmark_white_fill.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">My Bookmarks</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Management Section (Admin & Manager) -->
        <div class="mb-4" sec:authorize="hasAnyAuthority('Admin', 'Manager')">
            <h6 class="sidebar-section-title text-uppercase text-white-50 mb-3">Management</h6>
            <hr>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a th:href="@{/upload}" class="nav-link text-white" title="Upload Document">
                        <img src="/images/upload_doc_white_fill.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">Upload Document</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/tags-management}" class="nav-link text-white" title="Tags Management">
                        <img src="/images/tag_white_fill.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">Tags</span>
                    </a>
                </li>
                <li class="nav-item mb-2" id="classification-mgmt-container">
                    <a th:href="@{/classifications-management}" id="classificationMgmtLink" class="nav-link text-white" title="Classifications Management">
                        <img src="/images/classification_white_fill.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">Classifications</span>
                        <span id="classification-edition-badge" class="edition-badge" style="display: none;"></span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Administration Section (Admin only) -->
        <div class="mb-4" sec:authorize="hasAuthority('Admin')">
            <h6 class="sidebar-section-title text-uppercase text-white-50 mb-3">Administration</h6>
            <hr>
            <ul class="nav flex-column">
                <li class="nav-item mb-2" id="bulk-upload-container">
                    <a th:href="@{/bulk-upload}" id="bulkUploadLink" class="nav-link text-white" title="Bulk Upload Documents">
                        <img src="/images/bulk_upload_white_fill.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">Bulk Upload</span>
                        <span id="edition-badge" class="edition-badge" style="display: none;"></span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/users}" class="nav-link text-white" title="User Management">
                        <img src="/images/user_management_white_fill.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">User Management</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/access-control}" class="nav-link text-white" title="Access Control">
                        <img src="/images/access_control_white_fill.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">Access Control</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/settings}" class="nav-link text-white" title="Settings">
                        <img src="/images/setting_white_fill.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">Settings</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a th:href="@{/activity-logs}" class="nav-link text-white" title="Activity Logs">
                        <img src="/images/Activity_logs_white_fill.png"
                             class="sidebar-icon-image"
                             alt="Document Library Icon">
                        <span class="sidebar-text">Activity Logs</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- Sidebar Styles Fragment -->
<style th:fragment="sidebar-styles">

    /*
     * ✅ CRITICAL FIX: Apply collapsed state via CSS using data attribute on <html>.
     * This fires BEFORE the page is painted, so there is zero layout shift/flash
     * when navigating between pages.
     */
    html[data-sidebar="collapsed"] #sidebar {
        width: 70px;
    }
    html[data-sidebar="collapsed"] .main-content {
        margin-left: 70px;
    }
    html[data-sidebar="collapsed"] .sidebar-text,
    html[data-sidebar="collapsed"] .sidebar-section-title {
        opacity: 0;
        width: 0;
        overflow: hidden;
        display: none;
    }
    html[data-sidebar="collapsed"] .sidebar-container .nav-link {
        justify-content: center;
        padding: 12px 0;
    }
    html[data-sidebar="collapsed"] .sidebar-icon {
        margin-right: 0;
        font-size: 20px;
    }
    html[data-sidebar="collapsed"] .edition-badge {
        display: none !important;
    }

    /* Sidebar Container - Fixed Position */
    .sidebar-container {
        position: fixed;
        top: 70px;
        left: 0;
        width: 250px;
        height: calc(100vh - 70px);
        background-color: #1e3a5f;
        transition: all 0.3s ease;
        z-index: 1000;
        overflow: hidden;
    }

    /* Sidebar Content - Scrollable */
    .sidebar-content {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 20px 15px;
    }

    /* Custom Scrollbar for Sidebar */
    .sidebar-content::-webkit-scrollbar { width: 6px; }
    .sidebar-content::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
    .sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }
    .sidebar-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }

    /* Edition Badge */
    .edition-badge {
        font-size: 9px;
        padding: 2px 6px;
        border-radius: 10px;
        margin-left: 8px;
        font-weight: 600;
    }
    .edition-badge.ed2      { background: #48bb78; color: white; }
    .edition-badge.ed1-locked { background: #fc8181; color: white; }

    /* Collapsed Sidebar (JS-toggled class) */
    .sidebar-container.collapsed { width: 70px; }

    .sidebar-container.collapsed .sidebar-text,
    .sidebar-container.collapsed .sidebar-section-title {
        opacity: 0;
        width: 0;
        overflow: hidden;
        display: none;
    }
    .sidebar-container.collapsed .nav-link {
        justify-content: center;
        padding: 12px 0;
    }
    .sidebar-container.collapsed .sidebar-icon {
        margin-right: 0;
        font-size: 20px;
    }
    .sidebar-container.collapsed .edition-badge {
        display: none !important;
    }

    /* Navigation Links */
    .sidebar-container .nav-link {
        display: flex;
        align-items: center;
        padding: 10px 15px;
        border-radius: 5px;
        transition: all 0.3s ease;
        text-decoration: none;
        color: white;
        position: relative;
    }
    .sidebar-container .nav-link:hover {
        background-color: rgba(255,255,255,0.1);
        transform: translateX(5px);
    }
    .sidebar-container .nav-link.active {
        background-color: rgba(255,255,255,0.2);
        font-weight: 600;
    }
    .sidebar-container .nav-link.disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .sidebar-container .nav-link.disabled:hover {
        transform: none;
        background-color: transparent;
    }
    /* Sidebar Icon */
    .sidebar-icon-image {
        width: 20px;
        height: 20px;
        object-fit: contain;
        margin: 5px;
        transition: transform 0.3s ease;
    }

    .nav-link:hover .sidebar-icon-image{
        transform: scale(1.1);
    }

    /* Sidebar Icon */
    .sidebar-icon {
        min-width: 25px;
        margin-left: 6px;
        margin-right:6px
        font-size: 40px;
        transition: all 0.3s ease;
    }
    .nav-link:hover .sidebar-icon{
        transform: scale(1.1);
    }

    /* Sidebar Text */
    .sidebar-text {
        font-size: 18px;
        white-space: nowrap;
        transition: all 0.3s ease;
    }

    /* Section Titles */
    .sidebar-section-title {
        font-size: 11px;
        letter-spacing: 1px;
        padding-left: 15px;
        transition: all 0.3s ease;
    }
    .sidebar-container.collapsed .sidebar-section-title {
        padding-left: 0;
    }

    /* Main Content Adjustment */
    .main-content {
        margin-left: 250px;
        transition: margin-left 0.3s ease;
        padding-top: 70px;
    }
    .main-content.expanded {
        margin-left: 70px;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .sidebar-container {
            width: 250px;
            transform: translateX(-100%);
        }
        .sidebar-container.mobile-open {
            transform: translateX(0);
        }
        .sidebar-container.collapsed {
            transform: translateX(-100%);
        }
        .main-content {
            margin-left: 0 !important;
        }
    }
</style>

<!-- Sidebar JavaScript for Edition Control -->
<script th:fragment="sidebar-script">

    // INSTANT PRE-PAINT: Apply cached license config before browser paints
    // so badges never flicker on page navigation.
    (function() {
        try {
            const cached = sessionStorage.getItem('licenseStatus');
            if (!cached) return;
            const data = JSON.parse(cached);

            // Bulk Upload badge
            const bulkLink  = document.getElementById('bulkUploadLink');
            const bulkBadge = document.getElementById('edition-badge');
            if (bulkLink && bulkBadge) {
                if (data.bulkUploadAllowed && data.edition === 'ED2') {
                    bulkBadge.textContent = '✨';
                    bulkBadge.className   = 'edition-badge ed2';
                    bulkBadge.style.display = 'inline';
                } else {
                    bulkLink.href = '#';
                    bulkLink.classList.add('disabled');
                    bulkBadge.textContent = '🔒 ED2';
                    bulkBadge.className   = 'edition-badge ed1-locked';
                    bulkBadge.style.display = 'inline';
                }
            }

            // Classification badge
            const classLink  = document.getElementById('classificationMgmtLink');
            const classBadge = document.getElementById('classification-edition-badge');
            if (classLink && classBadge) {
                const allowed = data.edition === 'ED2' && data.isValid && data.isActive;
                if (allowed) {
                    classBadge.textContent = '✨';
                    classBadge.className   = 'edition-badge ed2';
                    classBadge.style.display = 'inline';
                } else {
                    classLink.href = '#';
                    classLink.classList.add('disabled');
                    classBadge.textContent = '🔒 ED2';
                    classBadge.className   = 'edition-badge ed1-locked';
                    classBadge.style.display = 'inline';
                }
            }

            // Edition banner
            const banner = document.getElementById('license-edition-badge');
            const text   = document.getElementById('edition-text');
            if (banner && text) {
                banner.style.display = 'block';
                if (data.edition === 'ED2') {
                    banner.style.background = 'linear-gradient(135deg, #48bb78 0%, #38a169 100%)';
                    text.textContent = '✨ ED2 Professional';
                } else {
                    banner.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                    text.textContent = 'ED1 Standard';
                }
            }
        } catch(e) { /* corrupt cache - full fetch will run on DOMContentLoaded */ }
    })();

    // DOMContentLoaded: wire up click handlers + fetch fresh data if no cache
    document.addEventListener('DOMContentLoaded', function() {
        const cached = sessionStorage.getItem('licenseStatus');
        if (cached) {
            try {
                // Re-apply to wire up onclick handlers (badges already painted above)
                applyLicenseSidebarConfig(JSON.parse(cached));
                return;
            } catch(e) { /* bad cache, fall through */ }
        }
        checkLicenseEditionForSidebar();
    });

    async function checkLicenseEditionForSidebar() {
        try {
            const response = await fetch('/api/license/status');
            const data = await response.json();
            // ✅ Cache for the session so subsequent page loads skip the API call
            sessionStorage.setItem('licenseStatus', JSON.stringify(data));
            applyLicenseSidebarConfig(data);
        } catch (error) {
            console.error('Failed to check license edition:', error);
        }
    }

    function applyLicenseSidebarConfig(data) {
        setupBulkUpload(data);
        setupClassificationManagement(data);
        showEditionBanner(data);
    }

    function setupBulkUpload(data) {
        const bulkUploadLink = document.getElementById('bulkUploadLink');
        const editionBadge   = document.getElementById('edition-badge');
        if (!bulkUploadLink) return;

        if (data.bulkUploadAllowed && data.edition === 'ED2') {
            bulkUploadLink.href = '/bulk-upload';
            bulkUploadLink.classList.remove('disabled');
            if (editionBadge) {
                editionBadge.textContent = '✨';
                editionBadge.className = 'edition-badge ed2';
                editionBadge.style.display = 'inline';
            }
        } else {
            bulkUploadLink.href = '#';
            bulkUploadLink.classList.add('disabled');
            if (editionBadge) {
                editionBadge.textContent = '🔒 ED2';
                editionBadge.className = 'edition-badge ed1-locked';
                editionBadge.style.display = 'inline';
            }
            bulkUploadLink.onclick = function(e) {
                e.preventDefault();
                showUpgradeModal('Bulk Upload', data.edition, data.daysRemaining);
            };
        }
    }

    function setupClassificationManagement(data) {
        const classificationLink  = document.getElementById('classificationMgmtLink');
        const classificationBadge = document.getElementById('classification-edition-badge');
        if (!classificationLink) return;

        const allowed = data.edition === 'ED2' && data.isValid && data.isActive;
        if (allowed) {
            classificationLink.href = '/classifications-management';
            classificationLink.classList.remove('disabled');
            if (classificationBadge) {
                classificationBadge.textContent = '✨';
                classificationBadge.className = 'edition-badge ed2';
                classificationBadge.style.display = 'inline';
            }
        } else {
            classificationLink.href = '#';
            classificationLink.classList.add('disabled');
            if (classificationBadge) {
                classificationBadge.textContent = '🔒 ED2';
                classificationBadge.className = 'edition-badge ed1-locked';
                classificationBadge.style.display = 'inline';
            }
            classificationLink.onclick = function(e) {
                e.preventDefault();
                showUpgradeModal('Classification Management', data.edition, data.daysRemaining);
            };
        }
    }

    function showEditionBanner(data) {
        const editionBanner = document.getElementById('license-edition-badge');
        const editionText   = document.getElementById('edition-text');
        if (!editionBanner || !editionText) return;

        editionBanner.style.display = 'block';
        if (data.edition === 'ED2') {
            editionBanner.style.background = 'linear-gradient(135deg, #48bb78 0%, #38a169 100%)';
            editionText.textContent = '✨ ED2 Professional';
        } else {
            editionBanner.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            editionText.textContent = 'ED1 Standard';
        }
    }

    function showUpgradeModal(featureName, currentEdition, daysRemaining) {
        const modal = document.createElement('div');
        modal.style.cssText = `position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.8);display:flex;align-items:center;
            justify-content:center;z-index:99999;`;

        const features = featureName === 'Bulk Upload'
            ? `<li>✨ <strong>Bulk Upload</strong> - Upload multiple documents at once</li>
               <li>📊 <strong>Advanced Analytics</strong> - Detailed insights and reports</li>
               <li>🔖 <strong>Classification Management</strong> - Create and manage classifications</li>
               <li>🚀 <strong>Priority Support</strong> - Fast response time</li>`
            : `<li>🔖 <strong>Classification Management</strong> - Create, edit, delete classifications</li>
               <li>✨ <strong>Bulk Upload</strong> - Upload multiple documents at once</li>
               <li>📊 <strong>Advanced Analytics</strong> - Detailed insights and reports</li>
               <li>🚀 <strong>Priority Support</strong> - Fast response time</li>`;

        modal.innerHTML = `
            <div style="background:white;padding:40px;border-radius:16px;max-width:550px;
                        text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
                <div style="font-size:64px;margin-bottom:20px;">🔒</div>
                <h2 style="color:#2d3748;margin-bottom:15px;font-size:26px;">${featureName}</h2>
                <p style="color:#4a5568;line-height:1.8;margin-bottom:25px;font-size:15px;">
                    <strong>${featureName}</strong> is only available in the
                    <strong>ED2 Professional Edition</strong>.
                </p>
                <div style="background:linear-gradient(135deg,#fff3cd 0%,#ffeaa7 100%);
                            padding:20px;border-radius:12px;margin-bottom:25px;
                            border-left:4px solid #f39c12;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
                        <span style="color:#856404;font-weight:600;">Your Edition:</span>
                        <span style="color:#856404;font-weight:700;">${currentEdition || 'ED1'}</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
                        <span style="color:#856404;font-weight:600;">Required:</span>
                        <span style="color:#856404;font-weight:700;">ED2 Professional</span>
                    </div>
                    <div style="display:flex;justify-content:space-between;">
                        <span style="color:#856404;font-weight:600;">License Valid:</span>
                        <span style="color:#856404;font-weight:700;">${daysRemaining || '0'} days</span>
                    </div>
                </div>
                <h3 style="color:#667eea;margin-bottom:15px;font-size:18px;">ED2 Professional Features:</h3>
                <ul style="text-align:left;color:#4a5568;line-height:2;list-style:none;
                           padding:0;margin-bottom:25px;">
                    ${features}
                    <li>✅ <strong>All ED1 Features</strong> - Plus everything else</li>
                </ul>
                <button onclick="this.closest('div[style]').remove()"
                        style="padding:14px 40px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
                               color:white;border:none;border-radius:8px;cursor:pointer;
                               font-size:15px;font-weight:600;">Close</button>
                <p style="margin-top:20px;color:#718096;font-size:13px;font-style:italic;">
                    💡 Contact your administrator to upgrade to ED2 Professional Edition
                </p>
            </div>`;

        document.body.appendChild(modal);
        modal.onclick = e => { if (e.target === modal) modal.remove(); };
    }
</script>

</body>
</html>
